name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-and-test:
    name: Analyze & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  build-apk:
    name: Build APK (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: analyze-and-test
    if: github.event_name == 'push' || github.event.pull_request.draft == false
    strategy:
      matrix:
        include:
          - variant: mock
            target: lib/main_mock.dart
          - variant: dev
            target: lib/main.dart
          - variant: release
            target: lib/main_release.dart
    steps:
      - uses: actions/checkout@v6

      - name: Checkout astrology-core (Rust FFI dependency)
        uses: actions/checkout@v6
        with:
          repository: Crescent-Moon-AI/astrology-core
          token: ${{ secrets.CORE_ACCESS_TOKEN }}
          path: _astrology-core

      - name: Link astrology-core to expected path
        run: ln -s "$GITHUB_WORKSPACE/_astrology-core" "$GITHUB_WORKSPACE/../astrology-core"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk -t ${{ matrix.target }} --release

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/xingjian-${{ matrix.variant }}-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: xingjian-${{ matrix.variant }}-v${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/xingjian-${{ matrix.variant }}-*.apk
          retention-days: 14

      - name: Upload APK to Alibaba Cloud OSS
        if: github.event_name == 'push'
        continue-on-error: true
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
        run: |
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | bash
          VERSION="${{ steps.version.outputs.version }}"
          VARIANT="${{ matrix.variant }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          APK="build/app/outputs/flutter-apk/xingjian-${VARIANT}-v${VERSION}.apk"
          OSS_FLAGS="-e oss-cn-beijing.aliyuncs.com -i $OSS_ACCESS_KEY_ID -k $OSS_ACCESS_KEY_SECRET"
          # Archive build (never overwritten)
          ossutil cp "$APK" \
            "oss://astrology-application/releases/${VARIANT}/xingjian-${VARIANT}-v${VERSION}-${SHORT_SHA}.apk" \
            $OSS_FLAGS
          # Latest pointer (always overwritten)
          ossutil cp "$APK" \
            "oss://astrology-application/releases/${VARIANT}/xingjian-${VARIANT}-latest.apk" \
            $OSS_FLAGS
          # Write download links to job summary
          OSS_BASE="https://astrology-application.oss-cn-beijing.aliyuncs.com/releases/${VARIANT}"
          echo "### 📦 OSS Download — ${VARIANT}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | Link |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Archive | [xingjian-${VARIANT}-v${VERSION}-${SHORT_SHA}.apk](${OSS_BASE}/xingjian-${VARIANT}-v${VERSION}-${SHORT_SHA}.apk) |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Latest | [xingjian-${VARIANT}-latest.apk](${OSS_BASE}/xingjian-${VARIANT}-latest.apk) |" >> "$GITHUB_STEP_SUMMARY"
