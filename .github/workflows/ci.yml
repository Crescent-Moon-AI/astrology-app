name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      variant:
        description: 'APK variant to build'
        required: true
        default: mock
        type: choice
        options: [mock, dev, release, all]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  analyze-and-test:
    name: Analyze & Test
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Analyze
        run: flutter analyze --no-fatal-infos

      - name: Run tests
        run: flutter test

  # Detect file changes + compute build matrix
  setup:
    name: Setup Build Matrix
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.matrix.outputs.result }}
      should_build: ${{ steps.decide.outputs.should_build }}
    steps:
      - uses: actions/checkout@v6

      # Path filter (only for push/PR, not manual)
      - uses: dorny/paths-filter@v3
        id: filter
        if: github.event_name != 'workflow_dispatch'
        with:
          filters: |
            app:
              - 'lib/**'
              - 'android/**'
              - 'rust/**'
              - 'pubspec.yaml'
              - 'pubspec.lock'
              - '.github/workflows/ci.yml'

      - name: Decide whether to build
        id: decide
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "should_build=true" >> "$GITHUB_OUTPUT"
          else
            echo "should_build=${{ steps.filter.outputs.app }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Compute matrix
        id: matrix
        run: |
          MOCK='{"variant":"mock","target":"lib/main_mock.dart"}'
          DEV='{"variant":"dev","target":"lib/main.dart"}'
          REL='{"variant":"release","target":"lib/main_release.dart"}'

          case "${{ github.event_name }}" in
            workflow_dispatch)
              case "${{ inputs.variant }}" in
                all)  echo "result={\"include\":[$MOCK,$DEV,$REL]}" >> "$GITHUB_OUTPUT" ;;
                mock) echo "result={\"include\":[$MOCK]}" >> "$GITHUB_OUTPUT" ;;
                dev)  echo "result={\"include\":[$DEV]}" >> "$GITHUB_OUTPUT" ;;
                release) echo "result={\"include\":[$REL]}" >> "$GITHUB_OUTPUT" ;;
              esac
              ;;
            push)
              # Push to main: dev + release
              echo "result={\"include\":[$DEV,$REL]}" >> "$GITHUB_OUTPUT"
              ;;
            *)
              # PR: dev only
              echo "result={\"include\":[$DEV]}" >> "$GITHUB_OUTPUT"
              ;;
          esac

  build-apk:
    name: Build APK (${{ matrix.variant }})
    runs-on: ubuntu-latest
    needs: [analyze-and-test, setup]
    if: |
      always()
      && (needs.analyze-and-test.result == 'success' || needs.analyze-and-test.result == 'skipped')
      && needs.setup.outputs.should_build == 'true'
    strategy:
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    steps:
      - uses: actions/checkout@v6

      - name: Checkout astrology-core (Rust FFI dependency)
        uses: actions/checkout@v6
        with:
          repository: Crescent-Moon-AI/astrology-core
          token: ${{ secrets.CORE_ACCESS_TOKEN }}
          path: _astrology-core

      - name: Link astrology-core to expected path
        run: ln -s "$GITHUB_WORKSPACE/_astrology-core" "$GITHUB_WORKSPACE/../astrology-core"

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 21

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Cache Gradle
        uses: actions/cache@v5
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Install dependencies
        run: flutter pub get

      - name: Run code generation
        run: dart run build_runner build --delete-conflicting-outputs

      - name: Build APK
        run: flutter build apk -t ${{ matrix.target }} --release

      - name: Extract version
        id: version
        run: |
          VERSION=$(grep "^version:" pubspec.yaml | cut -d' ' -f2)
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

      - name: Rename APK
        run: |
          mv build/app/outputs/flutter-apk/app-release.apk \
             build/app/outputs/flutter-apk/xingjian-${{ matrix.variant }}-v${{ steps.version.outputs.version }}.apk

      - name: Upload APK
        uses: actions/upload-artifact@v7
        with:
          name: xingjian-${{ matrix.variant }}-v${{ steps.version.outputs.version }}
          path: build/app/outputs/flutter-apk/xingjian-${{ matrix.variant }}-*.apk
          retention-days: 14

      - name: Upload APK to Alibaba Cloud OSS
        continue-on-error: true
        env:
          OSS_ACCESS_KEY_ID: ${{ secrets.OSS_ACCESS_KEY_ID }}
          OSS_ACCESS_KEY_SECRET: ${{ secrets.OSS_ACCESS_KEY_SECRET }}
          # CNAME domain for APK downloads (OSS default endpoint blocks APK files)
          OSS_CNAME: dl.astrology.net.cn
        run: |
          curl -fsSL https://gosspublic.alicdn.com/ossutil/install.sh | sudo bash
          VERSION="${{ steps.version.outputs.version }}"
          VARIANT="${{ matrix.variant }}"
          SHORT_SHA="${GITHUB_SHA::7}"
          APK="build/app/outputs/flutter-apk/xingjian-${VARIANT}-v${VERSION}.apk"
          OSS_FLAGS="-e oss-cn-beijing.aliyuncs.com -i $OSS_ACCESS_KEY_ID -k $OSS_ACCESS_KEY_SECRET"
          # PR builds go to pr/ subdirectory to avoid polluting main releases
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            OSS_PREFIX="releases/${VARIANT}/pr"
          else
            OSS_PREFIX="releases/${VARIANT}"
          fi
          # Archive build (never overwritten)
          ARCHIVE_NAME="xingjian-${VARIANT}-v${VERSION}-${SHORT_SHA}.apk"
          ossutil cp "$APK" "oss://astrology-application/${OSS_PREFIX}/${ARCHIVE_NAME}" $OSS_FLAGS
          # Latest pointer (only on push to main or manual trigger)
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            LATEST_NAME="xingjian-${VARIANT}-latest.apk"
            ossutil cp -f "$APK" "oss://astrology-application/${OSS_PREFIX}/${LATEST_NAME}" $OSS_FLAGS
          fi
          # Write download links to job summary (CNAME domain bypasses APK restriction)
          echo "### OSS Download — ${VARIANT}" >> "$GITHUB_STEP_SUMMARY"
          echo "| Build | Link |" >> "$GITHUB_STEP_SUMMARY"
          echo "|-------|------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Archive | [${ARCHIVE_NAME}](https://${OSS_CNAME}/${OSS_PREFIX}/${ARCHIVE_NAME}) |" >> "$GITHUB_STEP_SUMMARY"
          if [ -n "$LATEST_NAME" ]; then
            echo "| Latest | [${LATEST_NAME}](https://${OSS_CNAME}/${OSS_PREFIX}/${LATEST_NAME}) |" >> "$GITHUB_STEP_SUMMARY"
          fi
